<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reference Link Created</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="logo-banner">
    <a href="{{ url_for('home') }}">
        <img src="{{ url_for('static', filename='referencebridge-logo.png') }}" alt="ReferenceBridge Logo" class="site-logo">
    </a>
</div>

<h1>Secure Reference Link Created</h1>

<p>Send this link to the referee:</p>

<input type="text" value="{{ secure_link }}" readonly style="width:100%; padding:10px;">

<p>
    <a href="{{ secure_link }}" target="_blank">Open Reference Link</a>
</p>

<p>
    <a href="{{ url_for('create_request') }}">Create Another Request</a>
</p>

<p>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</p>

</body>
</html>
