<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ReferencePro Admin Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="logo-banner">
    <div class="logo-icon">✓</div>
    <div class="logo-text">
        <h2>ReferencePro</h2>
        <p>Admin access</p>
    </div>
</div>

<h1>Admin Login</h1>

{% if errors %}
<div class="alert">
    {% for error in errors %}
        <p>{{ error }}</p>
    {% endfor %}
</div>
{% endif %}

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <label>Password:</label><br>
    <input type="password" name="password" required><br><br>

    <button type="submit">Log In</button>
</form>

</body>
</html>
