<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ReferenceBridge Admin Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="logo-banner">
    <a href="{{ url_for('home') }}">
        <img src="{{ url_for('static', filename='referencebridge-logo.png') }}" alt="ReferenceBridge Logo" class="site-logo">
    </a>
</div>

<h1>Admin Login</h1>

{% if errors %}
<div class="alert">
    {% for error in errors %}
        <p>{{ error }}</p>
    {% endfor %}
</div>
{% endif %}

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <label>Password:</label><br>
    <input type="password" name="password" required><br><br>

    <button type="submit">Log In</button>
</form>

</body>
</html>
