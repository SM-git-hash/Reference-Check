<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ReferenceBridge | Create Organisation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<h1>Create Organisation</h1>
{% if errors %}
<div class="alert">{% for error in errors %}<p>{{ error }}</p>{% endfor %}</div>
{% endif %}
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>Name</label>
    <input type="text" name="name" required>
    <label>Slug</label>
    <input type="text" name="slug" placeholder="auto-generated if blank">
    <label>Primary Contact Name</label>
    <input type="text" name="primary_contact_name">
    <label>Primary Contact Email</label>
    <input type="email" name="primary_contact_email">
    <label>Subscription Plan</label>
    <input type="text" name="subscription_plan" value="trial">
    <button type="submit">Create Organisation</button>
</form>
<p><a href="{{ url_for('super_admin_dashboard') }}">Back to Super Admin</a></p>
</body>
</html>
